name: optimize
description: 현재 프로젝트의 성능 최적화를 진행합니다 - TypeScript 체크, ESLint 실행, 번들 분석 등을 자동으로 수행합니다
args: []
steps:
  - type: message
    content: |
      🚀 Next.js 프로젝트 성능 최적화를 시작합니다...

      다음 항목들을 검사합니다:
      1. TypeScript 타입 체크
      2. ESLint 코드 품질 검사
      3. 번들 사이즈 분석
      4. 성능 문제 진단

  - type: bash
    command: npm run type-check 2>/dev/null || echo "⚠️ type-check 스크립트가 없습니다"
    description: TypeScript 타입 체크 실행

  - type: bash
    command: npm run lint 2>/dev/null || echo "⚠️ lint 스크립트가 없습니다"
    description: ESLint 코드 검사 실행

  - type: bash
    command: npm run build 2>/dev/null || echo "⚠️ build 스크립트가 없습니다"
    description: Next.js 빌드 최적화

  - type: message
    content: |
      ✅ 성능 최적화 검사 완료!

      📊 최적화 팁:
      - 대용량 이미지는 Next.js Image 컴포넌트 사용
      - 동적 import로 번들 분할
      - unused CSS 제거 (Tailwind CSS 사용)
      - React.memo, useMemo로 불필요한 렌더링 방지
      - API 라우트 최적화 및 캐싱 적용
